name: Release Splice

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: splice.html
          generate_release_notes: true
