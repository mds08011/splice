<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SiteScribe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #121212;
    --bg2: #1e1e1e;
    --bg3: #2c2c2c;
    --tx: #e0e0e0;
    --tx2: #a0a0a0;
    --tx3: #707070;
    --bd: #333333;
    --red: #ff5252;
    --red-bg: rgba(255, 82, 82, 0.1);
    --blu: #448aff;
    --blu-bg: rgba(68, 138, 255, 0.1);
    --grn: #69f0ae;
    --r: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px 16px;
    background-color: var(--bg); color: var(--tx);
    font-family: system-ui, -apple-system, sans-serif;
    display: flex; justify-content: center;
    min-height: 100vh; line-height: 1.5;
  }
  .app { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 24px; }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
  .icon-btn { 
    background: none; border: 1px solid var(--bd); color: var(--tx); 
    border-radius: 50%; width: 40px; height: 40px; display: flex; 
    align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
  }
  .icon-btn:hover { background: var(--bg3); }
  .card { background-color: var(--bg2); border: 1px solid var(--bd); border-radius: var(--r); padding: 24px; }
  .title { font-size: 16px; font-weight: 600; margin: 0 0 16px 0; display: flex; align-items: center; gap: 8px;}
  
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; border-radius: var(--r);
    border: 1px solid var(--bd); background-color: var(--bg3);
    color: var(--tx); font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .btn:hover { filter: brightness(1.2); }
  .btn-red { background-color: var(--red-bg); color: var(--red); border-color: rgba(255, 82, 82, 0.3); }
  .btn-primary { background-color: var(--blu-bg); color: var(--blu); border-color: rgba(68, 138, 255, 0.3); }
  
  textarea {
    width: 100%; height: 120px; background: var(--bg); color: var(--tx);
    border: 1px solid var(--bd); border-radius: var(--r); padding: 12px;
    font-family: inherit; resize: vertical; margin-bottom: 16px;
  }
  select, input {
    width: 100%; background: var(--bg); color: var(--tx);
    border: 1px solid var(--bd); border-radius: var(--r); padding: 12px;
    font-family: inherit; margin-bottom: 16px;
  }
  
  .output {
    background: var(--bg); border: 1px solid var(--bd); border-radius: var(--r);
    padding: 16px; min-height: 100px; margin-bottom: 16px; overflow-x: auto;
  }
  .output h1, .output h2, .output h3 { margin-top: 0; }
  .output p { margin-top: 0; }
  
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--bg2); padding: 24px; border-radius: var(--r);
    width: 90%; max-width: 400px; border: 1px solid var(--bd);
  }
  .hidden { display: none !important; }
  
  .status-text { font-size: 14px; color: var(--tx2); text-align: center; margin-bottom: 16px; }
  .recording-indicator { color: var(--red); animation: pulse 1.5s infinite ease-in-out; }
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="brand"><i class="ti ti-microphone-2"></i> SiteScribe</div>
    <button class="icon-btn" onclick="toggleModal(true)" title="Settings"><i class="ti ti-settings"></i></button>
  </div>

  <div class="card">
    <div class="title"><i class="ti ti-capture"></i> Capture Audio</div>
    <div id="status" class="status-text">Ready to record</div>
    
    <button class="btn" id="btn-start" onclick="startRecording()">
      <i class="ti ti-circle"></i> Start Recording
    </button>
    <button class="btn btn-red hidden" id="btn-stop" onclick="stopRecording()">
      <i class="ti ti-player-stop"></i> Stop Recording
    </button>
  </div>

  <div class="card">
    <div class="title"><i class="ti ti-align-left"></i> Live Transcript</div>
    <textarea id="transcript" placeholder="Transcription will appear here..."></textarea>
    
    <div class="title"><i class="ti ti-wand"></i> Summarization</div>
    <select id="template">
      <option value="technical_rfi">Technical RFI</option>
      <option value="submittal_variance">Submittal Variance</option>
      <option value="mop_work_plan">MOP/Work Plan</option>
      <option value="differing_site_condition">Differing Site Condition (COR)</option>
      <option value="meeting_action_items">Meeting Action Items</option>
    </select>
    <button class="btn btn-primary" id="btn-summary" onclick="generateSummary()">
      <i class="ti ti-sparkles"></i> Generate Summary
    </button>
  </div>

  <div class="card hidden" id="output-card">
    <div class="title"><i class="ti ti-file-text"></i> Output</div>
    <div id="output" class="output"></div>
    <button class="btn" onclick="copyOutput()">
      <i class="ti ti-copy"></i> Copy to Clipboard
    </button>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="title">Settings</div>
    <label style="display:block; margin-bottom: 8px; font-size: 14px;">Groq API Key</label>
    <input type="password" id="api-key" placeholder="gsk_...">
    <div style="display: flex; gap: 12px;">
      <button class="btn" onclick="toggleModal(false)">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  const el = id => document.getElementById(id);
  
  let apiKey = localStorage.getItem('sitescribe_groq_key') || '';
  if (apiKey) el('api-key').value = apiKey;
  
  function toggleModal(show) {
    el('settings-modal').style.display = show ? 'flex' : 'none';
  }
  
  function saveSettings() {
    apiKey = el('api-key').value.trim();
    localStorage.setItem('sitescribe_groq_key', apiKey);
    toggleModal(false);
  }

  let captSt = null, micStream = null, audioCtx = null;
  let rec = null, chunks = [];
  let isDesktop = !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);

  const startDesktop = async () => {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      alert('Microphone access denied.'); return;
    }
    try {
      captSt = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    } catch (e) {
      micStream.getTracks().forEach(t => t.stop()); return;
    }
    
    const sysTracks = captSt.getAudioTracks();
    if (!sysTracks.length) {
      captSt.getTracks().forEach(t => t.stop());
      micStream.getTracks().forEach(t => t.stop());
      alert('No system audio found. Turn on "Share system audio".'); return;
    }
    
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    const dest = audioCtx.createMediaStreamDestination();
    
    audioCtx.createMediaStreamSource(new MediaStream([sysTracks[0]])).connect(dest);
    audioCtx.createMediaStreamSource(micStream).connect(dest);
    
    setupRec(dest.stream);
  };

  const startMobile = async () => {
    try {
      captSt = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      alert('Microphone access denied.'); return;
    }
    setupRec(captSt);
  };

  const setupRec = (stream) => {
    chunks = [];
    let mimeUsed = '';
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
    for (let t of types) {
      if (MediaRecorder.isTypeSupported(t)) { mimeUsed = t; break; }
    }
    
    rec = mimeUsed ? new MediaRecorder(stream, { mimeType: mimeUsed }) : new MediaRecorder(stream);
    
    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    
    rec.onstop = async () => {
      el('status').innerText = 'Processing audio...';
      el('status').classList.remove('recording-indicator');
      const blob = new Blob(chunks, { type: mimeUsed || 'audio/webm' });
      await transcribeAudio(blob);
    };

    if (captSt) {
      captSt.getTracks().forEach(t => {
        t.onended = () => { if (rec && rec.state !== 'inactive') stopRecording(); };
      });
    }

    rec.start(1000);
    
    el('btn-start').classList.add('hidden');
    el('btn-stop').classList.remove('hidden');
    el('status').innerText = 'Recording...';
    el('status').classList.add('recording-indicator');
  };

  function startRecording() {
    if (!apiKey) { alert('Please configure your Groq API key in Settings first.'); toggleModal(true); return; }
    if (isDesktop) startDesktop();
    else startMobile();
  }

  function stopRecording() {
    if (rec && rec.state !== 'inactive') rec.stop();
    if (captSt) captSt.getTracks().forEach(t => t.stop());
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioCtx && audioCtx.state !== 'closed') audioCtx.close().catch(()=>{});
    
    el('btn-start').classList.remove('hidden');
    el('btn-stop').classList.add('hidden');
  }

  async function transcribeAudio(blob) {
    el('status').innerText = 'Transcribing...';
    el('transcript').value = 'Uploading and transcribing...';
    try {
      const formData = new FormData();
      formData.append("file", blob, "audio.webm");
      formData.append("model", "whisper-large-v3-turbo");
      
      const res = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${apiKey}` },
        body: formData
      });
      
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      el('transcript').value = data.text || '';
      el('status').innerText = 'Ready to record';
    } catch (e) {
      console.error(e);
      el('transcript').value = 'Error transcribing: ' + e.message;
      el('status').innerText = 'Transcription failed';
    }
  }

  async function generateSummary() {
    const transcript = el('transcript').value.trim();
    if (!transcript) { alert('No transcript available to summarize.'); return; }
    if (!apiKey) { alert('Please configure your Groq API key in Settings first.'); toggleModal(true); return; }
    
    el('btn-summary').innerText = 'Generating...';
    el('btn-summary').disabled = true;
    
    const templateKey = el('template').value;
    const prompts = {
      technical_rfi: "You are a Project Engineer. Based on the transcript, draft a Technical RFI (Request for Information). Include a clear Problem Statement, Proposed Solution (if any), and Required Information. Format as Markdown.",
      submittal_variance: "You are a Project Engineer. Based on the transcript, draft a Submittal Variance. Detail the original specification, the proposed variance, and the justification. Format as Markdown.",
      mop_work_plan: "You are a Project Engineer. Based on the transcript, draft a Method of Procedure (MOP) or Work Plan. Include Objectives, Prerequisites, Step-by-Step Procedure, and Safety considerations. Format as Markdown.",
      differing_site_condition: "You are a Project Engineer. Based on the transcript, draft a Differing Site Condition (Change Order Request). Describe the expected condition vs actual condition, impact on schedule, and impact on cost. Format as Markdown.",
      meeting_action_items: "You are a Project Engineer. Based on the meeting transcript, extract all action items, design decisions, and assignees. Format as a clear, concise Markdown list."
    };
    
    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${apiKey}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [
            { role: "system", content: prompts[templateKey] },
            { role: "user", content: `Transcript:\n${transcript}` }
          ]
        })
      });
      
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      const resultText = data.choices[0].message.content;
      
      el('output-card').classList.remove('hidden');
      el('output').innerHTML = marked.parse(resultText);
      el('output').dataset.rawMarkdown = resultText;
      
    } catch (e) {
      console.error(e);
      alert('Error generating summary: ' + e.message);
    } finally {
      el('btn-summary').innerHTML = '<i class="ti ti-sparkles"></i> Generate Summary';
      el('btn-summary').disabled = false;
    }
  }

  function copyOutput() {
    const md = el('output').dataset.rawMarkdown;
    if (md) {
      navigator.clipboard.writeText(md).then(() => {
        alert('Copied to clipboard!');
      }).catch(err => alert('Failed to copy: ' + err));
    }
  }
</script>
</body>
</html>
